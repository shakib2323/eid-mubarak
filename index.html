<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Eid Mubarak ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold2: #FFA500; --deep: #03030f;
  --moon: #fffacd; --crimson: #cc0000; --rose: #ff69b4;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);cursor:none;}

/* CUSTOM CURSOR */
#cursor{position:fixed;width:20px;height:20px;border-radius:50%;background:rgba(255,215,0,0.6);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:transform 0.1s;box-shadow:0 0 15px #ffd700,0 0 30px #ffd70088;mix-blend-mode:screen;}
#cursor-trail{position:fixed;width:8px;height:8px;border-radius:50%;background:rgba(255,165,0,0.4);pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:left 0.08s,top 0.08s;}

/* MAIN CANVAS (always behind) */
#bg-canvas{position:fixed;inset:0;z-index:0;}

/* =================== ENTRY SCREEN =================== */
#entry{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%, #0a1a3a 0%, #03030f 70%);
  transition:opacity 1.5s ease,transform 1.8s cubic-bezier(0.4,0,0.2,1);
}
#entry.gone{opacity:0;transform:scale(1.15) rotateX(5deg);pointer-events:none;}

.entry-deco-ring{
  position:absolute;border-radius:50%;border:1px solid;animation:ringPulse 4s ease-in-out infinite;
}
.ring1{width:300px;height:300px;border-color:rgba(255,215,0,0.08);animation-delay:0s;}
.ring2{width:450px;height:450px;border-color:rgba(255,215,0,0.05);animation-delay:0.5s;}
.ring3{width:600px;height:600px;border-color:rgba(255,215,0,0.03);animation-delay:1s;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.5;}50%{transform:scale(1.05);opacity:1;}}

.crescent-wrap{position:relative;margin-bottom:8px;animation:crescentFloat 4s ease-in-out infinite;}
@keyframes crescentFloat{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-12px) rotate(5deg);}}
.crescent-svg{width:90px;filter:drop-shadow(0 0 25px #fffacd) drop-shadow(0 0 50px #ffd700);}

.entry-tagline{
  font-family:'Amiri',serif;font-size:0.85rem;color:#888;letter-spacing:8px;text-transform:uppercase;
  margin-bottom:6px;animation:fadeSlideDown 1s ease both;animation-delay:0.3s;
}
.entry-h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4vw,2.8rem);
  color:var(--gold);letter-spacing:5px;
  text-shadow:0 0 40px #ffd700aa,0 0 80px #ffd70044;
  animation:fadeSlideDown 1s ease both;animation-delay:0.5s;
  margin-bottom:6px;
}
.entry-arabic{
  font-family:'Amiri',serif;font-size:1.4rem;color:#c8a050;
  letter-spacing:3px;margin-bottom:32px;
  animation:fadeSlideDown 1s ease both;animation-delay:0.7s;
  text-shadow:0 0 20px #c8a05066;
}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

.glass-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:24px;padding:38px 48px;
  min-width:360px;max-width:420px;
  box-shadow:0 0 80px rgba(255,215,0,0.08),inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  animation:fadeSlideUp 1.2s cubic-bezier(0.34,1.56,0.64,1) both;animation-delay:0.8s;
  display:flex;flex-direction:column;gap:20px;
}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.field-label{font-family:'Amiri',serif;color:#c8a050;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;display:block;}
.name-inp{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,215,0,0.25);
  border-radius:12px;color:#fff;font-size:1.15rem;font-family:'Amiri',serif;
  outline:none;transition:all 0.3s;
}
.name-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,0.1),0 0 25px rgba(255,215,0,0.15);}
.name-inp::placeholder{color:rgba(255,255,255,0.25);}

.gender-row{display:flex;gap:12px;}
.g-btn{
  flex:1;padding:13px 8px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:#888;font-size:1rem;font-family:'Amiri',serif;
  cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);letter-spacing:1px;
  position:relative;overflow:hidden;
}
.g-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;border-radius:inherit;}
.g-btn.male-sel{border-color:#cc000088;color:#ff6666;background:rgba(180,0,0,0.12);box-shadow:0 0 20px rgba(200,0,0,0.2);}
.g-btn.female-sel{border-color:#ff69b488;color:#ffb6d9;background:rgba(255,100,180,0.12);box-shadow:0 0 20px rgba(255,100,180,0.2);}

.go-btn{
  padding:15px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#ffd700 0%,#ffa500 50%,#ff8c00 100%);
  background-size:200% 200%;
  color:#1a0800;font-size:1.1rem;font-family:'Cinzel Decorative',serif;font-weight:700;
  cursor:pointer;letter-spacing:2px;
  box-shadow:0 6px 30px rgba(255,165,0,0.5),0 2px 0 rgba(255,255,255,0.3) inset;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);animation:btnShimmer 3s ease infinite;
}
.go-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(255,165,0,0.7);}
.go-btn:active{transform:translateY(0) scale(0.98);}
@keyframes btnShimmer{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.err{color:#ff7777;font-size:0.8rem;text-align:center;min-height:16px;}

/* =================== MAIN SCREEN =================== */
#main{position:fixed;inset:0;z-index:100;opacity:0;transition:opacity 2s ease;pointer-events:none;}
#main.live{opacity:1;pointer-events:all;}

/* Overlay canvas for fireworks & particles */
#fx-canvas{position:absolute;inset:0;z-index:400;pointer-events:none;}

/* ---- SOLAR SYSTEM ---- */
#solar{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:10;
  animation:solarIn 2.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes solarIn{from{opacity:0;transform:scale(0.1) rotate(-30deg);}to{opacity:1;transform:scale(1) rotate(0deg);}}
#solar.exit{animation:solarOut 1.5s ease forwards;}
@keyframes solarOut{to{opacity:0;transform:scale(4) rotate(20deg);}}

.sw{position:relative;width:580px;height:580px;}
.sun{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#fff9c4,#ffdd00,#ff8800,#ff4400);
  box-shadow:0 0 30px #ffdd00,0 0 60px #ff8800,0 0 100px #ff440066,0 0 160px #ff220022;
  animation:sunPulse 2.5s ease-in-out infinite;z-index:5;
}
@keyframes sunPulse{
  0%,100%{box-shadow:0 0 30px #ffdd00,0 0 60px #ff8800,0 0 100px #ff440066;}
  50%{box-shadow:0 0 50px #fff,0 0 100px #ffdd00,0 0 180px #ff8800aa,0 0 240px #ff440044;}
}
.sun-corona{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,200,0,0.2) 0%,transparent 70%);
  animation:coronaSpin 8s linear infinite;
}
@keyframes coronaSpin{from{transform:translate(-50%,-50%) rotate(0deg) scale(1);}50%{transform:translate(-50%,-50%) rotate(180deg) scale(1.3);}to{transform:translate(-50%,-50%) rotate(360deg) scale(1);}}

.orb{
  position:absolute;top:50%;left:50%;border-radius:50%;
  border:1px solid rgba(255,255,255,0.07);
  transform-origin:0 0;
  transform:translate(-50%,-50%);
}
.orb::after{content:'';position:absolute;border-radius:50%;}

/* orbit sizes + speeds */
.o1{width:80px;height:80px;animation:spin 2.4s linear infinite;}
.o2{width:120px;height:120px;animation:spin 4.5s linear infinite;}
.o3{width:170px;height:170px;animation:spin 7s linear infinite;}
.o4{width:220px;height:220px;animation:spin 12s linear infinite;}
.o5{width:280px;height:280px;animation:spin 22s linear infinite;}
.o6{width:340px;height:340px;animation:spin 36s linear infinite;}
.o7{width:410px;height:410px;animation:spin 52s linear infinite;}
.o8{width:480px;height:480px;animation:spin 82s linear infinite;}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}

.pl{
  position:absolute;border-radius:50%;
  top:0;left:50%;transform:translate(-50%,-50%);
  cursor:pointer;transition:box-shadow 0.3s;
}
.pl:hover{filter:brightness(1.5);}

/* planets */
.p1{width:7px;height:7px;background:radial-gradient(circle at 35% 30%,#ddd,#888,#444);}
.p2{width:11px;height:11px;background:radial-gradient(circle at 35% 30%,#ffe8a0,#c88820,#7a5010);}
.p3{width:13px;height:13px;background:radial-gradient(circle at 35% 30%,#80ffcc,#2299aa,#005588);}
.p4{width:10px;height:10px;background:radial-gradient(circle at 35% 30%,#ff9966,#cc3300,#882200);}
.p5{width:26px;height:26px;background:radial-gradient(circle at 35% 30%,#f5dba0,#c89040,#8a5820);box-shadow:0 0 12px #c8904066;}
.p6{width:22px;height:22px;background:radial-gradient(circle at 35% 30%,#f0de90,#b09030,#806820);}
.saturn-rings{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(72deg);
  width:44px;height:12px;border-radius:50%;
  box-shadow:0 0 0 5px rgba(200,180,80,0.45),0 0 0 8px rgba(160,140,60,0.25);
  border:2px solid rgba(200,180,80,0.3);pointer-events:none;
}
.p7{width:17px;height:17px;background:radial-gradient(circle at 35% 30%,#aaffee,#22aacc,#004466);}
.p8{width:16px;height:16px;background:radial-gradient(circle at 35% 30%,#9999ff,#3344cc,#111166);}

/* planet label tooltips */
.pl-label{
  position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);color:#ffd700;font-size:9px;
  padding:2px 5px;border-radius:4px;white-space:nowrap;opacity:0;
  transition:opacity 0.2s;pointer-events:none;font-family:'Amiri',serif;
}
.pl:hover .pl-label{opacity:1;}

/* asteroid belt */
.asteroid-belt{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:256px;height:256px;border-radius:50%;
  border:3px dotted rgba(180,160,100,0.08);
  animation:spin 120s linear infinite;
}

/* ---- EARTH ZOOM ---- */
#earth-view{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:20;opacity:0;pointer-events:none;transition:opacity 2s ease;
}
#earth-view.show{opacity:1;}

.earth-system{position:relative;display:flex;align-items:center;justify-content:center;width:300px;height:300px;}
.earth-outer-glow{
  position:absolute;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,transparent 40%,rgba(0,140,255,0.12) 60%,rgba(0,80,200,0.06) 80%,transparent);
  animation:earthGlowPulse 3s ease-in-out infinite;
}
@keyframes earthGlowPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

.big-earth{
  width:240px;height:240px;border-radius:50%;position:relative;overflow:hidden;
  animation:earthZoomIn 2.5s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow:
    0 0 0 2px rgba(0,180,255,0.3),
    0 0 40px rgba(0,120,255,0.5),
    0 0 100px rgba(0,80,200,0.3),
    inset -25px -25px 50px rgba(0,0,50,0.5);
}
@keyframes earthZoomIn{from{transform:scale(0.05);opacity:0;}to{transform:scale(1);opacity:1;}}

.earth-land{
  position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 80px 60px at 25% 45%,#2d6e4e 0%,transparent 80%),
    radial-gradient(ellipse 50px 40px at 55% 35%,#3a8040 0%,transparent 70%),
    radial-gradient(ellipse 70px 45px at 75% 55%,#1e5535 0%,transparent 70%),
    radial-gradient(ellipse 40px 55px at 45% 70%,#255e3a 0%,transparent 70%),
    radial-gradient(ellipse 60px 30px at 15% 70%,#1a4a2a 0%,transparent 70%),
    linear-gradient(180deg,#0a2560 0%,#0e4480 30%,#1a6090 60%,#0a2560 100%);
  animation:earthSpin 18s linear infinite;
}
@keyframes earthSpin{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}

.earth-clouds{
  position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(ellipse 70px 22px at 30% 38%,rgba(255,255,255,0.35) 0%,transparent 80%),
    radial-gradient(ellipse 55px 18px at 65% 28%,rgba(255,255,255,0.28) 0%,transparent 80%),
    radial-gradient(ellipse 45px 14px at 50% 65%,rgba(255,255,255,0.22) 0%,transparent 80%),
    radial-gradient(ellipse 35px 10px at 80% 50%,rgba(255,255,255,0.18) 0%,transparent 80%);
  animation:cloudSpin 10s linear infinite;mix-blend-mode:screen;
}
@keyframes cloudSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.earth-atmosphere{
  position:absolute;inset:-6px;border-radius:50%;
  background:radial-gradient(circle,transparent 45%,rgba(0,200,255,0.15) 60%,rgba(0,120,255,0.08) 75%,transparent 85%);
  animation:atmospherePulse 4s ease-in-out infinite;
}
@keyframes atmospherePulse{0%,100%{opacity:0.7;}50%{opacity:1;}}

/* MOON orbiting Earth */
.earth-moon{
  position:absolute;width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#e0dcc8,#b0aa90,#807860);
  box-shadow:0 0 8px rgba(220,210,180,0.4);
  animation:moonOrbit 6s linear infinite;
  top:0;left:50%;transform-origin:0 120px;
}
@keyframes moonOrbit{from{transform:translate(-50%,-50%) rotate(0deg) translateX(130px) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg) translateX(130px) rotate(-360deg);}}

/* ---- SCENE (people, mosque) ---- */
#scene{
  position:absolute;bottom:0;left:0;right:0;height:250px;
  z-index:30;opacity:0;pointer-events:none;
  transition:opacity 2s ease;
}
#scene.show{opacity:1;}

.sky-gradient{
  position:absolute;bottom:70px;left:0;right:0;height:180px;
  background:linear-gradient(180deg,transparent 0%,rgba(5,20,5,0.5) 80%,rgba(5,20,5,0.9) 100%);
}
.ground-strip{
  position:absolute;bottom:0;left:0;right:0;height:72px;
  background:linear-gradient(180deg,#0c1a0c 0%,#162416 40%,#0a1a0a 100%);
  border-top:2px solid rgba(80,160,80,0.3);
  box-shadow:0 -4px 30px rgba(0,80,0,0.2);
}
.ground-pattern{
  position:absolute;bottom:0;left:0;right:0;height:72px;
  background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 41px);
}

/* Mosque */
.masjid{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  animation:masjidRise 1.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes masjidRise{from{transform:translateX(-50%) translateY(150px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

.masjid-main{position:relative;display:flex;flex-direction:column;align-items:center;}
.masjid-dome{
  width:90px;height:48px;border-radius:50% 50% 0 0;
  background:linear-gradient(160deg,#d4aa55 0%,#b08828 40%,#7a5c18 100%);
  box-shadow:0 -4px 25px rgba(255,215,0,0.25),inset -8px -8px 20px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
.masjid-dome::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:6px;height:16px;background:#ffd700;border-radius:3px 3px 0 0;box-shadow:0 0 10px #ffd700;}
.masjid-dome::after{content:'☪';position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:12px;color:#ffd700;text-shadow:0 0 8px #ffd700;}

.masjid-sub-dome{
  position:absolute;width:40px;height:22px;border-radius:50% 50% 0 0;
  background:linear-gradient(160deg,#c8a050,#9a7030);
  top:-5px;
}
.masjid-sub-dome.sl{left:-30px;}
.masjid-sub-dome.sr{right:-30px;}

.masjid-body{
  width:120px;height:58px;
  background:linear-gradient(180deg,#a08030 0%,#7a5e20 40%,#5a4010 100%);
  display:flex;align-items:flex-end;justify-content:space-around;padding:0 10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,215,0,0.15);
}
.masjid-arch{
  width:28px;height:40px;border-radius:50% 50% 0 0;
  border:1.5px solid rgba(255,215,0,0.5);
  background:rgba(0,0,0,0.4);
  box-shadow:inset 0 0 8px rgba(255,200,0,0.1);
}
.masjid-windows{display:flex;gap:6px;position:absolute;top:8px;}
.masjid-window{width:14px;height:10px;border-radius:50% 50% 0 0;border:1px solid rgba(255,215,0,0.4);background:rgba(255,200,50,0.1);}

.minaret{
  position:absolute;bottom:0;width:16px;
  background:linear-gradient(180deg,#c8a050 0%,#8a6820 60%,#6a4e10 100%);
  border-radius:2px;
  box-shadow:2px 0 8px rgba(0,0,0,0.4);
}
.min-l{left:-22px;height:110px;}
.min-r{right:-22px;height:110px;}
.minaret-cap{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:8px solid transparent;border-right:8px solid transparent;
  border-bottom:14px solid #ffd700;
  filter:drop-shadow(0 0 6px #ffd700);
}
.minaret-balcony{
  position:absolute;top:30px;left:50%;transform:translateX(-50%);
  width:22px;height:4px;background:#c8a050;border-radius:2px;
}

/* People (CSS art) */
.person{
  position:absolute;bottom:68px;
  display:flex;flex-direction:column;align-items:center;
  animation:personAppear 1s cubic-bezier(0.34,1.56,0.64,1) both, personBob 2s ease-in-out infinite;
}
@keyframes personAppear{from{opacity:0;transform:translateY(30px) scale(0.8);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes personBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

.ph{width:22px;height:22px;border-radius:50%;position:relative;flex-shrink:0;}
.pb{width:20px;height:32px;border-radius:5px 5px 2px 2px;position:relative;flex-shrink:0;}
.parms{
  position:absolute;top:6px;height:4px;border-radius:2px;
  animation:armWave 1.2s ease-in-out infinite;
}
@keyframes armWave{0%,100%{transform:rotate(-12deg);}50%{transform:rotate(12deg);}}
.plegs{display:flex;gap:5px;flex-shrink:0;}
.pleg{border-radius:0 0 3px 3px;animation:legWalk 0.7s ease-in-out infinite alternate;}
.pleg:nth-child(2){animation-delay:-0.35s;}
@keyframes legWalk{from{transform:skewX(-10deg);}to{transform:skewX(10deg);}}

/* Male style */
.male .ph{background:radial-gradient(circle at 40% 35%,#d4a070,#a06040);}
.male .ph::after{content:'';position:absolute;top:-5px;left:-1px;right:-1px;height:9px;background:#f0f0f0;border-radius:5px 5px 0 0;box-shadow:0 -2px 5px rgba(255,255,255,0.3);}
.male .pb{background:linear-gradient(180deg,#2244aa,#112288);}
.male .parms{background:#2244aa;left:-12px;right:-12px;}
.male .pleg{background:#111c55;width:8px;height:22px;}

/* Female style */
.female .ph{background:radial-gradient(circle at 40% 35%,#d4a070,#a06040);}
.female .ph::before{content:'';position:absolute;inset:-4px -3px;border-radius:50%;background:rgba(180,80,180,0.4);z-index:-1;}
.female .pb{background:linear-gradient(180deg,#993399,#661166);width:26px;border-radius:5px 5px 12px 12px;}
.female .parms{background:#993399;left:-12px;right:-12px;}
.female .pleg{background:#993399;width:10px;height:26px;}

/* Praying */
.praying .parms{animation:prayHands 2.5s ease-in-out infinite;top:4px;left:-4px;right:-4px;}
@keyframes prayHands{0%,100%{transform:scaleX(0.4) rotate(-20deg);}50%{transform:scaleX(0.4) rotate(20deg);}}

/* Child */
.child .ph{width:15px;height:15px;}
.child .pb{width:14px;height:20px;}
.child .pleg{width:6px;height:16px;}
.child .parms{left:-8px;right:-8px;}

/* Lanterns */
.lantern{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;animation:lanternSway 3.5s ease-in-out infinite;}
@keyframes lanternSway{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
.lantern-string{width:1.5px;height:30px;background:rgba(255,215,0,0.4);}
.lantern-top{width:16px;height:4px;background:#c8a050;border-radius:2px;}
.lantern-bod{
  width:22px;height:32px;border-radius:5px;
  position:relative;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 15px currentColor,0 0 30px currentColor,inset 0 0 10px rgba(255,255,255,0.1);
}
.lantern-flame{
  width:8px;height:10px;background:radial-gradient(circle,#fff 0%,#ffe066 40%,transparent 80%);
  border-radius:50% 50% 40% 40%;
  animation:flameFlicker 0.4s ease-in-out infinite alternate;
}
@keyframes flameFlicker{from{transform:scaleX(1) scaleY(1) rotate(-3deg);}to{transform:scaleX(0.8) scaleY(1.2) rotate(3deg);}}
.lantern-bot{width:16px;height:4px;background:#c8a050;border-radius:2px;}
.lantern-tassel{width:2px;height:12px;background:rgba(200,160,80,0.6);border-radius:1px;}

/* ---- EID MESSAGE ---- */
#eid-msg{
  position:absolute;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 2s ease;
  padding-bottom:200px;
}
#eid-msg.show{opacity:1;}

.msg-bg-orb{
  position:absolute;width:500px;height:300px;border-radius:50%;
  filter:blur(80px);opacity:0;
  animation:orbAppear 2s ease 0.5s forwards;
}
@keyframes orbAppear{to{opacity:0.15;}}
.orb-m{background:radial-gradient(ellipse,var(--orb-col),transparent);}

.bismillah{
  font-family:'Amiri',serif;font-size:1.1rem;color:rgba(255,215,0,0.6);
  letter-spacing:4px;margin-bottom:8px;
  animation:blessIn 1s ease 0.5s both;
}
.msg-name{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2rem,5.5vw,4rem);
  letter-spacing:4px;margin-bottom:4px;
  animation:nameIn 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
}
.msg-eid{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.8rem,8vw,6.5rem);
  font-weight:900;letter-spacing:8px;line-height:1;
  animation:eidIn 1.5s cubic-bezier(0.34,1.56,0.64,1) 1s both;
  position:relative;
}
.msg-eid::before{
  content:attr(data-text);position:absolute;inset:0;
  filter:blur(15px);opacity:0.6;
  animation:eidGlow 3s ease-in-out infinite;
}
@keyframes eidGlow{0%,100%{filter:blur(15px);opacity:0.4;}50%{filter:blur(25px);opacity:0.8;}}
@keyframes blessIn{from{opacity:0;letter-spacing:12px;}to{opacity:1;letter-spacing:4px;}}
@keyframes nameIn{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
@keyframes eidIn{from{opacity:0;transform:scale(0.3) rotateX(30deg);}to{opacity:1;transform:scale(1) rotateX(0deg);}}

.msg-arabic{
  font-family:'Amiri',serif;font-size:clamp(1.4rem,3.5vw,2.4rem);
  color:var(--gold);margin-top:10px;letter-spacing:3px;
  text-shadow:0 0 20px #ffd70099,0 0 50px #ffd70044;
  animation:arabicIn 1s ease 1.5s both;
}
@keyframes arabicIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}

.msg-dua{
  font-family:'Amiri',serif;font-size:1rem;letter-spacing:3px;
  margin-top:14px;animation:duaIn 1s ease 1.8s both;
  opacity:0.75;
}
@keyframes duaIn{from{opacity:0;}to{opacity:0.75;}}

.msg-ornament{
  display:flex;align-items:center;gap:16px;margin-top:18px;
  animation:ornIn 1s ease 2s both;font-size:1.2rem;color:rgba(255,215,0,0.5);
}
@keyframes ornIn{from{opacity:0;}to{opacity:1;}}
.orn-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.4),transparent);}

/* Gender themes */
.theme-male .msg-name{color:#ff5555;text-shadow:0 0 20px #ff0000,0 0 50px #cc000088;}
.theme-male .msg-eid{
  background:linear-gradient(135deg,#ff0000,#cc0000,#1a0000,#880000,#ff2200,#cc0000);
  background-size:300% 300%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:eidIn 1.5s cubic-bezier(0.34,1.56,0.64,1) 1s both,maleEidAnim 4s linear 2.5s infinite;
  filter:drop-shadow(0 0 30px #ff0000aa);
}
.theme-male .msg-eid::before{background:inherit;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.theme-male .msg-dua{color:#ff9999;}
.theme-male .msg-ornament{color:rgba(200,0,0,0.5);}
.theme-male .msg-bg-orb{--orb-col:#880000;}

@keyframes maleEidAnim{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.theme-female .msg-name{color:#ff80c0;text-shadow:0 0 20px #ff69b4,0 0 50px #ff69b488;}
.theme-female .msg-eid{
  background:linear-gradient(135deg,#ff69b4,#ff1493,#ffb6d9,#ff80c0,#ff1493,#ffb6d9);
  background-size:300% 300%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:eidIn 1.5s cubic-bezier(0.34,1.56,0.64,1) 1s both,femaleEidAnim 4s linear 2.5s infinite;
  filter:drop-shadow(0 0 30px #ff69b4aa);
}
.theme-female .msg-eid::before{background:inherit;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.theme-female .msg-dua{color:#ffb6d9;}
.theme-female .msg-ornament{color:rgba(255,100,180,0.5);}
.theme-female .msg-bg-orb{--orb-col:#880044;}

@keyframes femaleEidAnim{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

/* ---- BG ELEMENTS ---- */
.bg-crescent{
  position:absolute;top:5%;right:8%;z-index:5;
  animation:crescentBobBg 7s ease-in-out infinite;
}
@keyframes crescentBobBg{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-20px) rotate(5deg);}}

.star-shape{
  position:absolute;pointer-events:none;z-index:5;
  animation:starRotate 20s linear infinite,starPulse 3s ease-in-out infinite;
  color:rgba(255,215,0,0.15);font-size:24px;
}
@keyframes starRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes starPulse{0%,100%{opacity:0.1;}50%{opacity:0.35;}}

/* ---- AUDIO INDICATOR ---- */
#audio-indicator{
  position:fixed;bottom:20px;right:20px;z-index:600;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,215,0,0.2);
  border-radius:50px;padding:8px 16px;display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);
  opacity:0;transition:opacity 1s ease;
}
#audio-indicator.show{opacity:1;}
#audio-indicator:hover{background:rgba(255,215,0,0.1);border-color:rgba(255,215,0,0.4);}
.audio-bars{display:flex;align-items:flex-end;gap:3px;height:18px;}
.audio-bar{width:3px;background:#ffd700;border-radius:2px;animation:barBounce 0.8s ease-in-out infinite;}
.audio-bar:nth-child(1){height:6px;animation-delay:0s;}
.audio-bar:nth-child(2){height:14px;animation-delay:0.1s;}
.audio-bar:nth-child(3){height:10px;animation-delay:0.2s;}
.audio-bar:nth-child(4){height:16px;animation-delay:0.05s;}
.audio-bar:nth-child(5){height:8px;animation-delay:0.15s;}
@keyframes barBounce{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}
.audio-label{font-family:'Amiri',serif;font-size:0.75rem;color:#ffd700;letter-spacing:1px;}
#audio-indicator.muted .audio-bar{animation:none;transform:scaleY(0.3);opacity:0.4;}

/* Replay button */
#replay-btn{
  position:fixed;bottom:20px;left:20px;z-index:600;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,215,0,0.2);
  border-radius:50px;padding:8px 16px;
  cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);
  font-family:'Amiri',serif;font-size:0.75rem;color:#ffd700;letter-spacing:1px;
  opacity:0;
}
#replay-btn.show{opacity:1;}
#replay-btn:hover{background:rgba(255,215,0,0.1);}

/* Responsive */
@media(max-width:600px){
  .sw{width:340px;height:340px;}
  .o5{width:180px;height:180px;}.o6{width:220px;height:220px;}
  .o7{width:260px;height:260px;}.o8{width:300px;height:300px;}
  .glass-card{min-width:300px;padding:28px 24px;}
  .entry-h1{font-size:1.4rem;}
  #eid-msg{padding-bottom:220px;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="bg-canvas"></canvas>

<!-- ======= ENTRY ======= -->
<div id="entry">
  <div class="entry-deco-ring ring1"></div>
  <div class="entry-deco-ring ring2"></div>
  <div class="entry-deco-ring ring3"></div>

  <div class="crescent-wrap">
    <svg class="crescent-svg" viewBox="0 0 100 100">
      <defs>
        <radialGradient id="mg" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#fffde0"/>
          <stop offset="50%" stop-color="#ffd700"/>
          <stop offset="100%" stop-color="#cc8800"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="42" fill="url(#mg)"/>
      <circle cx="64" cy="44" r="36" fill="#03030f"/>
      <g fill="rgba(255,215,0,0.8)" font-size="10">
        <circle cx="22" cy="25" r="2" opacity="0.8"/>
        <circle cx="15" cy="38" r="1.5" opacity="0.6"/>
        <circle cx="28" cy="18" r="1" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <div class="entry-tagline">✦ Celebrating the Blessed Festival ✦</div>
  <div class="entry-h1">EID MUBARAK</div>

  <div class="glass-card">
    <div>
      <label class="field-label">Your Blessed Name</label>
      <input class="name-inp" id="nameInp" type="text" placeholder="Enter your name..." maxlength="22" autocomplete="off">
    </div>
    <div>
      <label class="field-label">Gender</label>
      <div class="gender-row">

    <div class="err" id="errMsg"></div>
    <button class="go-btn" onclick="launchEid()">☪ &nbsp; Begin Celebration &nbsp; ☪</button>

</div>

<!-- ======= MAIN ======= -->
<div id="main">
  <canvas id="fx-canvas"></canvas>

  <!-- BG decorations -->
  <div class="bg-crescent">
    <svg width="120" height="120" viewBox="0 0 100 100">
      <defs><radialGradient id="mg2" cx="40%" cy="35%"><stop offset="0%" stop-color="#fffde0"/><stop offset="60%" stop-color="#ffd700"/><stop offset="100%" stop-color="#cc8800"/></radialGradient></defs>
      <circle cx="50" cy="50" r="42" fill="url(#mg2)" opacity="0.9"/>
      <circle cx="66" cy="42" r="36" fill="#03030f"/>
    </svg>
  </div>
  <div class="star-shape" style="top:12%;left:5%;font-size:18px;">✦</div>
  <div class="star-shape" style="top:20%;left:90%;animation-delay:-5s;">✦</div>
  <div class="star-shape" style="top:70%;left:3%;animation-delay:-10s;font-size:16px;">✦</div>
  <div class="star-shape" style="top:8%;left:45%;animation-delay:-8s;font-size:12px;">✦</div>

  <!-- Solar system -->
  <div id="solar">
    <div class="sw">
      <div class="sun"><div class="sun-corona"></div></div>
      <div class="asteroid-belt"></div>

      <div class="orb o1"><div class="pl p1"><span class="pl-label">Mercury</span></div></div>
      <div class="orb o2"><div class="pl p2"><span class="pl-label">Venus</span></div></div>

      <div class="orb o4"><div class="pl p4"><span class="pl-label">Mars</span></div></div>
      <div class="orb o5"><div class="pl p5"><span class="pl-label">Jupiter</span></div></div>
      <div class="orb o6">
        <div class="pl p6" style="position:relative;overflow:visible;">
          <div class="saturn-rings"></div>

      <div class="orb o7"><div class="pl p7"><span class="pl-label">Uranus</span></div></div>

    </div>

  <!-- Earth view -->
  <div id="earth-view">
    <div class="earth-system">
      <div class="earth-outer-glow"></div>
      <div class="big-earth">
        <div class="earth-land"></div>

  <!-- Scene -->
  <div id="scene">
    <div class="sky-gradient"></div>
    <div class="ground-strip"><div class="ground-pattern"></div></div>

    <div class="masjid">
      <div class="masjid-main">
        <div class="minaret min-l" style="position:absolute;left:-22px;bottom:0;"><div class="minaret-cap"></div><div class="minaret-balcony"></div></div>
        <div class="minaret min-r" style="position:absolute;right:-22px;bottom:0;"><div class="minaret-cap"></div><div class="minaret-balcony"></div></div>
        <div class="masjid-dome">
          <div class="masjid-sub-dome sl"></div>

          <div class="masjid-arch"></div>
          <div class="masjid-arch"></div>

    <!-- people & lanterns injected by JS -->
  </div>

  <!-- Eid Message -->
  <div id="eid-msg">
    <div class="msg-bg-orb orb-m"></div>
    <div class="bismillah">☪ بسم الله الرحمن الرحيم ☪</div>
    <div class="msg-name" id="msgName"></div>
    <div class="msg-eid" id="msgEid" data-text="EID MUBARAK">EID MUBARAK</div>
    <div class="msg-arabic">عيد مبارك وكل عام وأنتم بخير</div>
    <div class="msg-dua" id="msgDua"></div>
    <div class="msg-ornament">

      <span>✦ ☪ ✦</span>

</div>

<!-- Audio Indicator -->
<div id="audio-indicator" onclick="toggleMute()">
  <div class="audio-bars">
    <div class="audio-bar"></div><div class="audio-bar"></div>
    <div class="audio-bar"></div><div class="audio-bar"></div>
    <div class="audio-bar"></div>
  </div>
  <span class="audio-label">SOUND ON</span>
</div>
<!-- <div id="replay-btn" onclick="replayAll()">↺ &nbsp; Replay</div> -->

<script>
// ===================== STATE =====================
let gender = '', userName = '', audioCtx, muted = false, masterGain;
const $ = id => document.getElementById(id);

// ===================== CURSOR =====================
const cur = $('cursor'), curT = $('cursor-trail');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
setInterval(() => { tx+=(mx-tx)*0.15; ty+=(my-ty)*0.15; curT.style.left=tx+'px'; curT.style.top=ty+'px'; }, 16);

// ===================== BG CANVAS (stars) =====================
const bgC = $('bg-canvas');
const bgX = bgC.getContext('2d');
let W,H,stars=[];
function resizeBg(){ W=bgC.width=window.innerWidth; H=bgC.height=window.innerHeight; buildStars(); }
function buildStars(){
  stars=[];
  for(let i=0;i<400;i++) stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.8+0.3,
    a:Math.random(),da:Math.random()*0.025+0.005,
    color:`hsl(${45+Math.random()*30},${60+Math.random()*40}%,${80+Math.random()*20}%)`
  });
}
let shooting=[];
function addShoot(){
  if(shooting.length<4&&Math.random()<0.015)
    shooting.push({x:Math.random()*W,y:Math.random()*H*0.5,vx:5+Math.random()*8,vy:2+Math.random()*5,len:60+Math.random()*100,a:1,trail:[]});
}
function animBg(){
  bgX.clearRect(0,0,W,H);
  // nebula
  [[0.25,0.3,280,'rgba(20,0,50,0.35)'],[0.75,0.5,220,'rgba(0,20,55,0.3)'],[0.5,0.8,180,'rgba(5,30,10,0.2)']].forEach(([cx,cy,r,c])=>{
    const g=bgX.createRadialGradient(W*cx,H*cy,0,W*cx,H*cy,r);
    g.addColorStop(0,c); g.addColorStop(1,'transparent');
    bgX.fillStyle=g; bgX.fillRect(0,0,W,H);
  });
  stars.forEach(s=>{
    s.a+=s.da*(Math.random()>0.5?1:-1);
    s.a=Math.max(0.05,Math.min(1,s.a));
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=s.color.replace(')',`,${s.a})`).replace('hsl','hsla');
    bgX.fill();
  });
  addShoot();
  for(let i=shooting.length-1;i>=0;i--){
    const s=shooting[i];
    s.trail.unshift({x:s.x,y:s.y});
    if(s.trail.length>20) s.trail.pop();
    bgX.beginPath(); bgX.moveTo(s.x,s.y);
    bgX.lineTo(s.x-s.len*(s.vx/10),s.y-s.len*(s.vy/10));
    const g=bgX.createLinearGradient(s.x,s.y,s.x-s.len,s.y-s.len);
    g.addColorStop(0,`rgba(255,248,200,${s.a})`);
    g.addColorStop(0.4,`rgba(255,220,100,${s.a*0.5})`);
    g.addColorStop(1,'transparent');
    bgX.strokeStyle=g; bgX.lineWidth=2; bgX.stroke();
    s.x+=s.vx; s.y+=s.vy; s.a-=0.018;
    if(s.a<=0) shooting.splice(i,1);
  }
  requestAnimationFrame(animBg);
}
window.addEventListener('resize',resizeBg);
resizeBg(); animBg();

// ===================== FX CANVAS =====================
const fxC = $('fx-canvas');
const fxX = fxC.getContext('2d');
let particles=[];
function resizeFx(){ fxC.width=window.innerWidth; fxC.height=window.innerHeight; }
window.addEventListener('resize',resizeFx); resizeFx();

function Particle(x,y,col,vx,vy,r,life,gravity){
  return{x,y,col,vx,vy,r,life,maxLife:life,gravity:gravity||0};
}
function animFx(){
  fxX.clearRect(0,0,fxC.width,fxC.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.98; p.life--;
    const a=p.life/p.maxLife;
    fxX.beginPath(); fxX.arc(p.x,p.y,p.r*a,0,Math.PI*2);
    fxX.fillStyle=p.col.replace(')',`,${a})`).replace('rgb','rgba');
    fxX.fill();
    if(p.life<=0) particles.splice(i,1);
  }
  requestAnimationFrame(animFx);
}
animFx();

function explode(x,y,colors,count=80,speed=8){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*speed+1;
    const c=colors[Math.floor(Math.random()*colors.length)];
    particles.push(Particle(x,y,c,Math.cos(a)*s,Math.sin(a)*s,2+Math.random()*3,60+Math.random()*40,0.08));
  }
}
function burst(x,y,color){
  explode(x,y,[color,'rgb(255,255,255)','rgb(255,240,150)'],60,10);
  // ring
  for(let i=0;i<30;i++){
    const a=(i/30)*Math.PI*2;
    particles.push(Particle(x,y,'rgb(255,215,0)',Math.cos(a)*12,Math.sin(a)*12,2,40,0.05));
  }
}
function goldRain(){
  for(let i=0;i<6;i++){
    const x=Math.random()*fxC.width, y=-10;
    particles.push(Particle(x,y,'rgb(255,215,0)',
      (Math.random()-0.5)*2, 2+Math.random()*4,
      2+Math.random()*3, 120+Math.random()*80, 0.05));
  }
}

// ===================== AUDIO =====================
function initAudio(){
  try{
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted?0:0.5;
    masterGain.connect(audioCtx.destination);
  }catch(e){}
}

function playTone(freq,type,duration,delay,gainVal,detune){
  if(!audioCtx||muted)return;
  try{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type=type||'sine'; osc.frequency.value=freq||440;
    if(detune) osc.detune.value=detune;
    g.gain.setValueAtTime(0,audioCtx.currentTime+(delay||0));
    g.gain.linearRampToValueAtTime(gainVal||0.3,audioCtx.currentTime+(delay||0)+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(delay||0)+duration);
    osc.connect(g); g.connect(masterGain);
    osc.start(audioCtx.currentTime+(delay||0));
    osc.stop(audioCtx.currentTime+(delay||0)+duration+0.05);
  }catch(e){}
}

function playChime(baseFreq,delay){
  const harmonics=[1,2,3,4,5];
  harmonics.forEach((h,i)=>playTone(baseFreq*h,'sine',1.5-i*0.2,delay+(i*0.08),0.15/(i+1)));
}

function playCelebrationSound(){
  if(!audioCtx)return;
  // Opening chord swell
  const chords=[[261.6,329.6,392,523.2],[293.7,370,440,587.3],[349.2,440,523.2,698.4],[392,493.9,587.3,783.9]];
  chords.forEach((chord,ci)=>{
    chord.forEach((f,fi)=>{
      playTone(f,'sine',2.5,ci*0.9+fi*0.05,0.12);
      playTone(f*2,'sine',1.5,ci*0.9+fi*0.05,0.04);
    });
  });
  // Melody
  const melody=[523.2,587.3,659.3,698.4,783.9,880,1046.5,880,783.9,659.3,587.3,523.2];
  const dur=  [0.3,0.3,0.3,0.3,0.3,0.3,0.6,0.3,0.3,0.3,0.3,0.6];
  let t=3.8;
  melody.forEach((f,i)=>{
    playTone(f,'triangle',dur[i]*0.9,t,0.18);
    playTone(f,'sine',dur[i]*0.9,t,0.06,-1200);
    t+=dur[i];
  });
  // Bell cascade
  [523.2,659.3,783.9,1046.5,1318.5].forEach((f,i)=>playChime(f,t+i*0.3));
  t+=3;
  // Celebratory fanfare
  const fanfare=[783.9,783.9,880,880,1046.5,880,783.9,659.3,783.9];
  const fanDur= [0.2,0.2,0.2,0.2,0.5,0.2,0.2,0.2,0.6];
  fanfare.forEach((f,i)=>{
    playTone(f,'square',fanDur[i]*0.8,t,0.06);
    playTone(f,'sawtooth',fanDur[i]*0.8,t,0.03);
    t+=fanDur[i];
  });
}

function playFireworkBoom(x,y){
  if(!audioCtx||muted)return;
  try{
    // Boom
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.5,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    const g=audioCtx.createGain(); g.gain.value=0.3;
    src.connect(g); g.connect(masterGain); src.start();
    // Sparkle
    [800,1200,1600,2000].forEach((f,i)=>playTone(f,'sine',0.3,i*0.05,0.05));
  }catch(e){}
}

function playLaunchWhoosh(){
  if(!audioCtx||muted)return;
  try{
    const osc=audioCtx.createOscillator();
    osc.type='sawtooth';
    const g=audioCtx.createGain();
    osc.frequency.setValueAtTime(80,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.4);
    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.connect(g); g.connect(masterGain);
    osc.start(); osc.stop(audioCtx.currentTime+0.6);
  }catch(e){}
}

function toggleMute(){
  muted=!muted;
  if(masterGain) masterGain.gain.value=muted?0:0.5;
  const ind=$('audio-indicator');
  ind.classList.toggle('muted',muted);
  ind.querySelector('.audio-label').textContent=muted?'SOUND OFF':'SOUND ON';
}

// ===================== PEOPLE BUILDER =====================

    {g:'female',left:'14%',delay:0.2, s:1,  praying:false},
    {g:'male',  left:'21%',delay:0.4, s:1.1,praying:true},

    {g:'female',left:'67%',delay:0.3, s:1,  praying:false},
    {g:'male',  left:'74%',delay:0.1, s:1.1,praying:false},
    {g:'female',left:'81%',delay:0.5, s:1,  praying:true},
    {g:'female',left:'88%',delay:0.35,s:0.85,praying:false,child:true},
    {g:'male',  left:'93%',delay:0.6, s:1,  praying:false},

    el.innerHTML=`<div class="ph"></div><div class="pb"><div class="parms"></div></div><div class="plegs"><div class="pleg"></div><div class="pleg"></div></div>`;
    scene.appendChild(el);
  });
}

function buildLanterns(){
  const scene=$('scene');
  const cols=['#ff6b35','#ffd700','#ff1493','#00c8ff','#ff4500','#aaffaa','#ff88cc','#ffaa00'];
  const pos=['4%','15%','27%','38%','50%','62%','74%','86%','95%'];
  pos.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='lantern';
    const c=cols[i%cols.length];
    const hue=Math.round(Math.random()*360);
    el.style.cssText=`left:${p};top:${5+Math.random()*55}px;animation-delay:${i*0.35}s;`;
    el.innerHTML=`
      <div class="lantern-string"></div>
      <div class="lantern-top"></div>
      <div class="lantern-bod" style="background:${c}22;border:1.5px solid ${c}88;color:${c};box-shadow:0 0 12px ${c}88,0 0 25px ${c}44;">
        <div class="lantern-flame"></div>
      </div>
      <div class="lantern-bot"></div>
      <div class="lantern-tassel"></div>
    `;
    scene.appendChild(el);
  });
}

// ===================== FIREWORKS =====================
function shootFirework(){
  const fx=fxC.width, fy=fxC.height;
  const tx=80+Math.random()*(fx-160);
  const ty=60+Math.random()*(fy*0.55);
  const cols=[
    ['rgb(255,215,0)','rgb(255,165,0)','rgb(255,255,180)'],
    ['rgb(255,80,80)','rgb(255,0,60)','rgb(255,180,180)'],
    ['rgb(100,200,255)','rgb(0,150,255)','rgb(180,230,255)'],
    ['rgb(180,100,255)','rgb(120,0,255)','rgb(220,180,255)'],
    ['rgb(100,255,150)','rgb(0,200,80)','rgb(180,255,200)'],
    ['rgb(255,120,180)','rgb(255,0,120)','rgb(255,200,220)'],
  ];
  const c=cols[Math.floor(Math.random()*cols.length)];
  playLaunchWhoosh();
  setTimeout(()=>{ burst(tx,ty,c[0]); playFireworkBoom(tx,ty); },600);
  // Multiple bursts
  setTimeout(()=>explode(tx+20,ty-20,c,40,7),750);
  setTimeout(()=>explode(tx-20,ty+20,c,40,7),900);
}

let fwInterval;
function startFireworks(){
  shootFirework();
  setTimeout(shootFirework,800);
  setTimeout(shootFirework,1600);
  fwInterval=setInterval(()=>{
    const n=1+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++) setTimeout(shootFirework,i*350);
  },2500);
}

// ===================== MAIN LAUNCH =====================
function launchEid(){
  userName=$('nameInp').value.trim();
  const err=$('errMsg');
  if(!userName){err.textContent='✦ Please enter your blessed name!';return;}
  if(!gender){err.textContent='✦ Please select your gender!';return;}
  err.textContent='';

  initAudio();

  // Setup text
  $('msgName').textContent=userName;
  $('msgDua').textContent=gender==='male'
    ? '✦ Taqabbal Allaahu Minna Wa Minkum ✦'
    : '✦ May Allah Fill Your Days With Joy & Barakah ✦';

  const msg=$('eid-msg');
  msg.id='eid-msg'; msg.className=`theme-${gender}`;

  // Hide entry
  $('entry').classList.add('gone');

  // Show main
  const main=$('main');
  main.classList.add('live');

  // Show audio indicator
  setTimeout(()=>{ $('audio-indicator').classList.add('show'); $('replay-btn').classList.add('show'); },3000);

  // TIMELINE
  // 0–4s: Solar system spins (already animating)
  // 4s: Solar exits
  setTimeout(()=>{
    const sol=$('solar');
    sol.classList.add('exit');
  }, 4500);

  // 5.5s: Earth zooms in
  setTimeout(()=>{
    $('earth-view').classList.add('show');
  }, 5800);

  // 9s: Earth fades
  setTimeout(()=>{
    $('earth-view').style.transition='opacity 1.8s ease';
    $('earth-view').style.opacity='0';
  }, 9500);

  // 11s: Scene rises
  setTimeout(()=>{
    $('scene').classList.add('show');
    buildPeople();
    buildLanterns();
  }, 11000);

  // 13.5s: Eid message
  setTimeout(()=>{
    $('eid-msg').classList.add('show');
    playCelebrationSound();
    startFireworks();
  }, 13500);
}

function replayAll(){
  // Reset and re-run
  const main=$('main');
  main.classList.remove('live');
  main.style.opacity='0';

  // Clear dynamic children
  document.querySelectorAll('.person,.lantern').forEach(el=>el.remove());
  clearInterval(fwInterval);
  particles.length=0;

  const sol=$('solar'); sol.classList.remove('exit'); sol.style.opacity=''; sol.style.transform='';
  $('earth-view').classList.remove('show'); $('earth-view').style.opacity='';
  $('scene').classList.remove('show');
  $('eid-msg').classList.remove('show');

  setTimeout(()=>{ main.classList.add('live'); launchSequence(); },500);
}

function launchSequence(){
  setTimeout(()=>{ $('solar').classList.add('exit'); },4500);
  setTimeout(()=>{ $('earth-view').classList.add('show'); },5800);
  setTimeout(()=>{ $('earth-view').style.transition='opacity 1.8s ease'; $('earth-view').style.opacity='0'; },9500);
  setTimeout(()=>{ $('scene').classList.add('show'); buildPeople(); buildLanterns(); },11000);
  setTimeout(()=>{ $('eid-msg').classList.add('show'); playCelebrationSound(); startFireworks(); },13500);
}
